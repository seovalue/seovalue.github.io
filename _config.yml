# Site settings
title:          valuable
description:    "백엔드 개발자가 되기 위해 공부한 내용들을 담습니다."
url:            https://github.com/seovalue

# Author
author:
  name:         Seovalue
  email:        seominjeong.dev@gmail.com
  url:          https://github.com/seovalue

# Build settings
markdown:       kramdown

# Assets
sass:
  sass_dir:     _sass
  style:        compressed

# Gems
plugins:
  - jekyll-feed
  - jekyll-paginate
  # - jemoji #Uncomment this to allow emoji in your post

# Permalinks
permalink:      /:year-:month-:day/:title
paginate:       5

# Related posts settings
related_posts_section:
  max_count:        5
  min_common_tags:  2

# Links to social media
social:
  email: seominjeong.dev@gmail.com
  github: https://github.com/seovalue
  twitter: https://twitter.com
  linkedin: https://linkedin.com/
